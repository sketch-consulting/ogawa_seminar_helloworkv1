<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>無料オンラインセミナー｜ハローワーク求人票改善</title>
  <meta name="description" content="採用費を増やす前に、求人票を見直してみませんか。採用費を増やさず応募を増やすヒントがわかる無料オンラインセミナーです。" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="lp">
    <img src="images/01-fv.png" alt="応募が来ない。だから媒体を増やす。本当にその順番で良いでしょうか。" />

    <img src="images/02-p.png" alt="採用費だけが増えていませんか。" />
    <img src="images/03-a.png" alt="実は多くの企業が同じことをしています。" />
    <img src="images/04-s.png" alt="その前に見直せるものがあります。" />
    <img src="images/05-b.png" alt="45分でこんなことがわかります。" />

    <img src="images/06-e.png" alt="求職者は求人票を見て応募を決めています。" />
    <img src="images/07-c1.png" alt="45分で学べること。前半。" />
    <img src="images/08-c2.png" alt="学んだ内容を実際の改善につなげる。" />

    <img src="images/09-offer.png" alt="まずは無料で聞いてみませんか。" />

    <section id="form" class="form-section">
      <h2>まずは無料で参加してみませんか</h2>
      <p class="form-lead">
        必要事項をご入力ください。<br>
        参加URLをメールでご案内します。
      </p>

      <form action="https://formspree.io/f/xdavlegj" method="POST">
        <label>
          会社名<span>必須</span>
          <input type="text" name="会社名" required>
        </label>

        <label>
          担当者名<span>必須</span>
          <input type="text" name="担当者名" required>
        </label>

        <label>
          電話番号<span>必須</span>
          <input type="tel" name="電話番号" required>
        </label>

        <label>
          メールアドレス<span>必須</span>
          <input type="email" name="メールアドレス" required>
        </label>

        <label>
          希望日程<span>必須</span>
          <select name="希望日程" required>
            <option value="">希望日時を選択してください</option>
            <option value="7月15日（水）10:00〜10:45">7月15日（水）10:00〜10:45</option>
            <option value="7月22日（水）12:00〜12:45">7月22日（水）12:00〜12:45</option>
            <option value="7月29日（水）17:00〜17:45">7月29日（水）17:00〜17:45</option>
          </select>
        </label>

        <label>
          会社HP<span class="optional">任意</span>
          <input type="url" name="会社HP" placeholder="https://example.com">
        </label>

        <button type="submit">希望日時を選んで申し込む</button>
      </form>
    </section>
  </main>

  <a class="fixed-cta" href="#form">希望日時を選ぶ</a>

</body>
</html>
