<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無料オンラインセミナー｜ハローワーク求人票改善</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="lp">
    <img src="images/01-fv.png" alt="無料オンラインセミナー" />

    <section class="cta">
      <p>採用費を増やす前に、できることがあるかもしれません。</p>
      <a href="#form">希望日時を選ぶ</a>
    </section>

    <img src="images/02-p.png" alt="問題提起" />
    <img src="images/03-a.png" alt="親近感" />
    <img src="images/04-s.png" alt="解決策" />
    <img src="images/05-b.png" alt="受講メリット" />

    <section class="cta">
      <p>45分で、求人票改善のヒントがわかります。</p>
      <a href="#form">希望日時を選ぶ</a>
    </section>

    <img src="images/06-e.png" alt="証拠" />
    <img src="images/07-c1.png" alt="セミナー内容1" />
    <img src="images/08-c2.png" alt="セミナー内容2" />

    <section class="cta">
      <p>45分後には、今の求人票を見直したくなるはずです。</p>
      <a href="#form">希望日時を選ぶ</a>
    </section>

    <img src="images/09-offer.png" alt="セミナー案内" />
    <img src="images/10-entry.png" alt="申込案内" />

    <section id="form" class="form-section">
      <h2>無料セミナーに申し込む</h2>
      <p class="form-lead">必要事項をご入力ください。参加URLをメールでご案内します。</p>

      <form action="https://formspree.io/f/xdavlegj" method="POST">
        <label>会社名<span>必須</span>
          <input type="text" name="会社名" required>
        </label>

        <label>担当者名<span>必須</span>
          <input type="text" name="担当者名" required>
        </label>

        <label>電話番号<span>必須</span>
          <input type="tel" name="電話番号" required>
        </label>

        <label>メールアドレス<span>必須</span>
          <input type="email" name="メールアドレス" required>
        </label>

        <label>希望日程<span>必須</span>
          <select name="希望日程" required>
            <option value="">希望日時を選択してください</option>
            <option value="7月15日（水）10:00〜10:45">7月15日（水）10:00〜10:45</option>
            <option value="7月22日（水）12:00〜12:45">7月22日（水）12:00〜12:45</option>
            <option value="7月29日（水）17:00〜17:45">7月29日（水）17:00〜17:45</option>
          </select>
        </label>

        <label>会社HP<span class="optional">任意</span>
          <input type="url" name="会社HP">
        </label>

        <p class="privacy">
          営業目的のお電話はいたしません。<br>
          お預かりした情報はセミナー運営およびご案内の目的でのみ使用します。
        </p>

        <button type="submit">希望日時を選んで申し込む</button>
      </form>
    </section>
  </main>

  <a class="fixed-cta" href="#form">希望日時を選ぶ</a>

</body>
</html>
